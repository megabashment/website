name: Deploy to Strato

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
        run: |
          mkdir -p ~/.lftp
          echo "set sftp:auto-confirm yes" > ~/.lftp/rc
          echo "set net:timeout 10" >> ~/.lftp/rc
          echo "set net:max-retries 3" >> ~/.lftp/rc

          lftp -u "$SFTP_USER","$SFTP_PASS" sftp://$SFTP_HOST:22 -e "
            mirror --reverse --delete --verbose --exclude .git/ --exclude .github/ --exclude includes/config.php --exclude tools/ ./ /htdocs/;
            bye
          "

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passwort vergessen</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; overflow: hidden; }
    #bg { position: fixed; top: 0; left: 0; z-index: 0; display: block; }
    #forgot-container { position: relative; z-index: 1; }
    input:focus { outline: none; }
    .glowing-button {
      transition: all 0.3s ease;
    }
    .glowing-button:hover {
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.4), 0 0 40px rgba(124, 58, 237, 0.2);
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<canvas id="bg"></canvas>

<div id="forgot-container" class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="backdrop-blur-sm">

      <div class="text-center mb-8">
        <h2 class="text-2xl font-semibold text-zinc-300">Passwort vergessen</h2>
      </div>

      <form id="forgot-password-form" class="space-y-5">

        <div>
          <label for="username" class="block text-xs text-zinc-500 uppercase tracking-widest mb-3">
            Benutzername
          </label>
          <input
            id="username"
            type="text"
            placeholder=""
            required
            class="w-full bg-transparent border-b border-zinc-700 px-0 py-2 text-sm focus:border-violet-500 transition-colors placeholder-zinc-700 text-zinc-100"
          />
        </div>

        <div id="error-message" class="hidden text-sm text-red-400 bg-red-950/30 border border-red-900/50 rounded-lg p-3">
          <!-- Error text will be inserted here -->
        </div>

        <div id="success-message" class="hidden text-sm text-green-400 bg-green-950/30 border border-green-900/50 rounded-lg p-3">
          <!-- Success text will be inserted here -->
        </div>

        <button
          type="submit"
          class="glowing-button w-full mt-8 px-5 py-2.5 bg-violet-600 text-white rounded-lg text-sm font-semibold transition-colors"
        >
          Reset-Link anfordern
        </button>

        <div class="text-center">
          <a href="/login.html" class="text-sm text-zinc-400 hover:text-zinc-300 transition-colors">
            ← Zurück zur Anmeldung
          </a>
        </div>

      </form>

      <div class="text-xs text-zinc-600 text-center mt-8">
        Falls das Konto existiert, erhältst du eine E-Mail mit einem Reset-Link.
      </div>
    </div>
  </div>
</div>

<script>
// Canvas starfield animation
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Particle system
const particles = [];
const particleCount = 90;
const connectionDistance = 180;

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = (Math.random() - 0.5) * 0.5;
    this.radius = Math.random() * 1.5 + 0.5;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;

    // Bounce at edges
    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

    // Clamp position
    this.x = Math.max(0, Math.min(canvas.width, this.x));
    this.y = Math.max(0, Math.min(canvas.height, this.y));
  }

  draw() {
    ctx.fillStyle = `rgba(139, 92, 246, 0.8)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Initialize particles
for (let i = 0; i < particleCount; i++) {
  particles.push(new Particle());
}

function drawConnections() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < connectionDistance) {
        const opacity = (1 - distance / connectionDistance) * 0.15;
        ctx.strokeStyle = `rgba(109, 40, 217, ${opacity})`;
        ctx.lineWidth = 1;

        // Bezier curve with animated control point
        const mx = (particles[i].x + particles[j].x) / 2;
        const my = (particles[i].y + particles[j].y) / 2;
        const offset = Math.sin(Date.now() * 0.0005) * 5;
        const cpx = mx + offset * (dy / distance || 1);
        const cpy = my + offset * (dx / distance || 1);

        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.quadraticCurveTo(cpx, cpy, particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
}

function animate() {
  // Clear canvas with fade effect
  ctx.fillStyle = 'rgba(9, 9, 11, 0.1)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Update and draw particles
  for (let particle of particles) {
    particle.update();
    particle.draw();
  }

  // Draw connections
  drawConnections();

  requestAnimationFrame(animate);
}

animate();

// Resize handler
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const errorDiv = document.getElementById('error-message');
  const successDiv = document.getElementById('success-message');

  // Clear previous messages
  errorDiv.classList.add('hidden');
  successDiv.classList.add('hidden');
  errorDiv.textContent = '';
  successDiv.textContent = '';

  try {
    const response = await fetch('/api/auth.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'forgot_password', username })
    });

    const data = await response.json();

    // Always show success message (for security)
    successDiv.classList.remove('hidden');
    successDiv.textContent = data.message || 'Falls das Konto existiert, erhältst du eine E-Mail.';

    // Clear input
    document.getElementById('username').value = '';

    // Optionally redirect after delay
    setTimeout(() => {
      window.location.href = '/login.html';
    }, 3000);

  } catch (error) {
    errorDiv.classList.remove('hidden');
    errorDiv.textContent = 'Ein Fehler ist aufgetreten. Bitte versuche es später erneut.';
    console.error('Forgot password error:', error);
  }
});

// Check if already logged in and redirect
(async () => {
  try {
    const response = await fetch('/api/auth.php?action=status');
    const data = await response.json();
    if (data.ok) {
      window.location.href = '/index.php';
    }
  } catch (error) {
    // Silently ignore — not logged in
  }
})();
</script>

</body>
</html>
